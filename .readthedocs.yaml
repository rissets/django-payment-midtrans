# Read the Docs configuration file
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    # Install the package with docs extras
    - pip install .[docs]
    # Build without parallel mode (-j auto) to avoid Django AppRegistryNotReady
    # in forked child processes. Django's app registry doesn't survive fork().
    - python -m sphinx -T -b html -d docs/_build/doctrees -D language=en docs $READTHEDOCS_OUTPUT/html
